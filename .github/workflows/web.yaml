name: Web

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Mise
        uses: jdx/mise-action@v4

      - name: Install packages
        run: |
          corepack enable
          pnpm install --frozen-lockfile

      - name: Run check
        run: pnpm check

      - name: Run build
        run: pnpm build
